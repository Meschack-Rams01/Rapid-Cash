{% extends "base.html" %}

{% block title %}Mot de passe mis à jour - Rapid Cash{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md p-8 fade-in login-card text-center">
        <div class="w-16 h-16 rounded-full bg-status-success/20 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-status-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
        
        <h2 class="text-2xl font-bold text-fg mb-4">Mot de passe mis à jour</h2>
        <p class="text-muted-fg leading-relaxed mb-8">
            Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.
        </p>

        <a href="{% url 'login' %}" class="w-full flex justify-center py-3 px-4 border border-transparent shadow-sm text-sm font-medium text-white btn-login">
            Se connecter
        </a>
    </div>
</div>
{% endblock %}
